<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to Aswathy Associates Client Portal – Access your documents, appointments, payments and more.">
  <title>Client Login – Aswathy Associates | GST & Auditing</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="container">
    <a href="/" class="nav-brand"><div class="logo-icon">AA</div><div class="brand-text"><span class="brand-name">Aswathy Associates</span><span class="brand-tagline">GST & Auditing</span></div></a>
    <div class="nav-links" id="navLinks"><a href="/">Home</a><a href="/about">About</a><a href="/services">Services</a><a href="/gst-calculator">GST Calculator</a><a href="/contact">Contact</a></div>
    <div class="nav-actions"><a href="/login" class="btn btn-outline-white btn-sm active">Client Login</a><a href="/book-appointment" class="btn btn-gold btn-sm">Book Consultation</a><button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button></div>
  </div>
</nav>

<section class="section" style="min-height:85vh;display:flex;align-items:center;padding-top:100px;">
  <div class="container" style="max-width:440px;">
    <div class="card fade-in" style="padding:40px;">
      <div style="text-align:center;margin-bottom:30px;">
        <div class="logo-icon" style="width:60px;height:60px;font-size:1.3rem;margin:0 auto 16px;">AA</div>
        <h2 style="margin-bottom:4px;">Welcome Back</h2>
        <p style="color:var(--gray-500);font-size:0.9rem;">Sign in to your client portal</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div style="position:relative;">
            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required style="padding-right:50px;">
            <button type="button" onclick="togglePassword('loginPassword', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:0.85rem;">Show</button>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;cursor:pointer;">
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <a href="#" style="font-size:0.85rem;color:var(--emerald);">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">Sign In</button>
      </form>

      <div style="text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid var(--gray-200);">
        <p style="font-size:0.9rem;color:var(--gray-500);">Don't have an account? <a href="/register" style="color:var(--emerald);font-weight:600;">Create Account</a></p>
      </div>

      <div style="text-align:center;margin-top:16px;">
        <p style="font-size:0.8rem;color:var(--gray-400);">Admin? <a href="/login" onclick="fillAdmin()" style="color:var(--gold-dark);">Use admin credentials</a></p>
      </div>
    </div>
  </div>
</section>

<footer class="footer" style="margin-top:0;">
  <div class="container">
    <div class="footer-bottom"><p>&copy; 2026 Aswathy Associates. All rights reserved.</p></div>
  </div>
</footer>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/app.js"></script>
<script>
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'Hide';
  } else {
    input.type = 'password';
    btn.textContent = 'Show';
  }
}

function fillAdmin() {
  document.getElementById('loginEmail').value = 'aswathyandco@gmail.com';
  document.getElementById('loginPassword').value = 'Admin@123456';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    showToast('Please enter email and password.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showToast('Login successful! Redirecting...');

      // Redirect based on role
      setTimeout(() => {
        if (data.user.role === 'admin' || data.user.role === 'staff') {
          window.location.href = '/admin';
        } else {
          window.location.href = '/portal';
        }
      }, 1000);
    } else {
      showToast(data.error || 'Invalid email or password.', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (err) {
    showToast('Server not available. Please try again later.', 'error');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// If already logged in, redirect
const token = localStorage.getItem('token');
if (token) {
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (user.role === 'admin' || user.role === 'staff') {
    window.location.href = '/admin';
  } else {
    window.location.href = '/portal';
  }
}
</script>
</body>
</html>
